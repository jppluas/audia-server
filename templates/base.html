<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#F5F5F7">
  <title>{% block title %}Audia{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>
<div class="app-shell">
  <header class="app-header">
    <a class="logo" href="/" aria-label="Ir al inicio de Audia">
      <span class="logo-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" role="img">
          <path d="M5 14.5v-5M9 17V7m4 12V5m4 12V7m4 7.5v-5" />
        </svg>
      </span>
      <span>Audia</span>
    </a>
    {% block header_action %}
    <nav class="header-nav" aria-label="Navegación principal">
      <a href="{{ url_for('historial') }}" class="header-action">Historial</a>
      <a href="{{ url_for('device_panel') }}" class="header-action">Dispositivo</a>
    </nav>
    {% endblock %}
  </header>

  <main class="app-main">
    {% block content %}{% endblock %}
  </main>
</div>

<div id="toast-container"></div>
<script src="{{ url_for('static', filename='js/utils.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
